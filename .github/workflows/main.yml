name: Daily Security Intel

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # 升级到 v4，解决 Node 20 警告

      - name: 1. 建立隧道
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: 2. 安装并分析
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: |
          pip install openai requests beautifulsoup4
          python3 master_intel.py

      - name: 3. 投送至 NAS (带容错)
        continue-on-error: true  # 核心：即使这步连不上 NAS，也继续往下走，不报红叉
        uses: appleboy/scp-action@master
        with:
          host: 100.80.203.9
          username: ${{ secrets.NAS_USER }}
          password: ${{ secrets.NAS_PASSWORD }}
          port: 22
          source: "index.html"
          target: "/volume1/homes/Marble_soda/资料/新闻/"

      - name: 4. 备份存储 (如果 NAS 投送失败)
        uses: actions/upload-artifact@v4
        with:
          name: daily-intel-backup
          path: index.html
