name: Daily Security Intel

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # 每天早上 8 点自动运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 1. 连接 Tailscale 隧道
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: 2. 配置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. 执行 AI 情报分析
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: |
          pip install openai requests
          python3 master_intel.py

      - name: 4. 异地投送至 NAS
        uses: appleboy/scp-action@master
        with:
          host: 100.80.203.9
          username: github_bot
          password: ${{ secrets.NAS_PASSWORD }}
          port: 22
          source: "index.html"
          # 🚩 确保这里的 Marble_soda 大小写和你 NAS 里一模一样
          target: "/volume1/homes/Marble_soda/资料/新闻/"
