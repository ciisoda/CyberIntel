name: Daily Security Intel

on:
  schedule:
    - cron: '0 0 * * *' # 每天早上 8 点自动运行
  workflow_dispatch:     # 也可以手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 1. 建立 Tailscale 隧道
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: 2. 环境安装与 AI 运行
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: |
          # 🚩 关键：这里必须安装 beautifulsoup4
          pip install openai requests beautifulsoup4
          python3 master_intel.py

      - name: 3. 异地投送至管理员文件夹
        uses: appleboy/scp-action@master
        with:
          host: 100.80.203.9
          # 🚩 记得在 Secrets 里把 NAS_USER 改成 Marble_soda
          username: ${{ secrets.NAS_USER }}
          password: ${{ secrets.NAS_PASSWORD }}
          port: 22
          source: "index.html"
          target: "/volume1/homes/Marble_soda/资料/新闻/"
